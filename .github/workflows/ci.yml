name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: windows-latest
            python: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package
        run: python -m pip install -e ".[dev,browser,mcp]"
      - name: Install Chromium and Linux dependencies
        if: runner.os == 'Linux'
        run: python -m playwright install --with-deps chromium
      - name: Install Chromium
        if: runner.os == 'Windows'
        run: python -m playwright install chromium
      - name: Ruff
        run: python -m ruff check --no-cache crazy_harness tests work labs/16h_sprint
      - name: Tests
        run: python -m pytest -q -m "not llm and not nightly"

  frontend:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
