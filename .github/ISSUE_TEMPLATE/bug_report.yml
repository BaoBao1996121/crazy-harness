name: Bug report
description: Report a reproducible Harness or Control Room defect
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, private traces, or production data."
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include the smallest command, TaskPack, Event sequence, or test that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Durable evidence
      description: Relevant sanitized Event types, error output, commit SHA, OS, Python/Node versions.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, personal paths, private data, and proprietary source.
          required: true
